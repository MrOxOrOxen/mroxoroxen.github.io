<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云宝的直播间电池统计</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        /* 用户卡片样式 */
        .user-card {
            margin-bottom: 25px;
            border-bottom: 1px dashed #eee;
            padding-bottom: 15px;
        }

        .user-card:last-child {
            border-bottom: none;
        }

        /* 1. 用户1 (1880电池) 的样式 */
        .user-info {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        /* 礼物清单的样式（缩进效果） */
        .gift-details {
            list-style: none;
            padding-left: 35px; /* 这里实现你要求的缩进 */
            margin: 0;
        }

        .gift-item {
            font-size: 15px;
            color: #666;
            display: flex;
            justify-content: b;
            margin-bottom: 4px;
            font-family: "Lucida Console", Monaco, monospace; /* 等宽字体对齐 */
        }

        .gift-name {
            min-width: 120px;
            display: inline-block;
        }

        .status-msg {
            text-align: center;
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>

<div id="container">
    <h1>云宝的电池统计</h1>
    <div id="leaderboard">
        <p class="status-msg">正在连接服务器获取数据...</p>
    </div>
</div>

<script>
    // 【重要】请把这里的 IP 地址换成你的阿里云公网 IP
    const API_URL = "https://yqz.mroxoroxen.com/data";

    async function updateLeaderboard() {
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error("服务器响应异常");
            
            const data = await response.json();
            const container = document.getElementById('leaderboard');
            
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="status-msg">目前还没有收到礼物哦</p>';
                return;
            }

            container.innerHTML = ''; // 清空旧内容

            data.forEach((user, index) => {
                // 创建用户卡片
                const card = document.createElement('div');
                card.className = 'user-card';

                // 1. 用户标题：1. 用户名（电池数）
                const header = document.createElement('div');
                header.className = 'user-info';
                header.innerText = `${index + 1}. ${user.uname}（${user.total_batteries.toFixed(0)} 电池）：`;
                card.appendChild(header);

                // 2. 礼物清单（缩进部分）
                const giftList = document.createElement('ul');
                giftList.className = 'gift-details';

                if (user.gift_list && Object.keys(user.gift_list).length > 0) {
                    for (const [name, count] of Object.entries(user.gift_list)) {
                        const li = document.createElement('li');
                        li.className = 'gift-item';
                        li.innerHTML = `<span class="gift-name">${name}</span> <span>x${count}</span>`;
                        giftList.appendChild(li);
                    }
                } else {
                    const li = document.createElement('li');
                    li.className = 'gift-item';
                    li.innerText = "暂无具体礼物明细";
                    giftList.appendChild(li);
                }

                card.appendChild(giftList);
                container.appendChild(card);
            });

        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('leaderboard').innerHTML = 
                `<p class="status-msg" style="color:red;">连接失败：请检查服务器 IP 和 8000 端口是否开放</p>`;
        }
    }

    // 每 10 秒刷新一次数据
    setInterval(updateLeaderboard, 10000);
    // 页面加载时立即执行一次
    updateLeaderboard();
</script>

</body>
</html>
