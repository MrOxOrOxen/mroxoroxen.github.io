<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云宝的盲盒计数器 - 实时榜单</title>
    <style>
        :root {
            --primary-color: #00f2fe;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 500px;
            margin-top: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            text-align: center;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        .status-bar {
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 25px;
        }

        .leaderboard {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .row:hover {
            background: rgba(255, 255, 255, 0.07);
            border-left-color: var(--primary-color);
        }

        .rank {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.1rem;
            width: 45px;
            color: #94a3b8; /* 统一颜色 */
        }

        .name {
            flex-grow: 1;
            font-size: 1.05rem;
            color: #e2e8f0;
        }

        .battery {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--primary-color);
            font-weight: 600;
            font-size: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>盲盒统计中心</h1>
        <div class="status-bar" id="status">数据链路建立中...</div>
        
        <div class="leaderboard" id="leaderboard">
            </div>
    </div>

    <script>
        const API_URL = "https://yqz.mroxoroxen.com/data";

        async function updateData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                let data = await response.json();
                
                // 调试：如果你在浏览器按 F12 看到这个，就能知道数据长啥样
                console.log("Raw Data:", data);

                // 智能转换：确保我们拿到的是数组格式
                const sortedList = Object.entries(data)
                    .map(([name, value]) => {
                        // 核心修复：如果 value 是个对象，尝试取它的 count 或 num 属性，否则强制转数字
                        let batteryCount = 0;
                        if (typeof value === 'object' && value !== null) {
                            batteryCount = value.count || value.battery || value.num || 0;
                        } else {
                            batteryCount = parseInt(value) || 0;
                        }
                        return { name, battery: batteryCount };
                    })
                    .sort((a, b) => b.battery - a.battery);

                const container = document.getElementById('leaderboard');
                const status = document.getElementById('status');

                if (sortedList.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:40px;color:#64748b;">等待投喂中...</div>';
                } else {
                    container.innerHTML = sortedList.map((user, index) => `
                        <div class="row">
                            <div class="rank">${String(index + 1).padStart(2, '0')}</div>
                            <div class="name">${user.name}</div>
                            <div class="battery">${user.battery} ⚡</div>
                        </div>
                    `).join('');
                }

                status.innerText = `最后更新: ${new Date().toLocaleTimeString()} (每10s自动同步)`;
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('status').innerText = "数据同步异常，请检查云端状态";
            }
        }

        updateData();
        setInterval(updateData, 10000);
    </script>
</body>
</html>
